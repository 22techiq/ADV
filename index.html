<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Payment Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background: #f2f6fc;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      max-width: 500px;
      width: 100%;
      padding: 30px;
      background: #fff;
      margin-top: 50px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    h2, h3 {
      text-align: center;
      color: #0a7cff;
    }

    input, button {
      width: 100%;
      padding: 14px 12px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }

    button {
      background: #0a7cff;
      color: white;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: 0.3s;
    }

    button:hover {
      background: #065ecf;
    }

    .box {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      min-height: 50px;
      background: #f9f9f9;
    }

    .success {color: green; font-weight: bold;}
    .pending {color: orange; font-weight: bold;}
    .error {color: red; font-weight: bold;}
    a { color: #0a7cff; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h2>Secure Payment Portal</h2>

  <input type="email" id="email" placeholder="Enter your Email" required>
  <input type="number" id="amount" placeholder="Enter Amount (KES)" required>
  <button onclick="createPayment()">Pay Now</button>

  <div class="box" id="paymentBox">
    <p id="paymentLink"></p>
  </div>

  <hr>

  <h3>Check Payment Status</h3>
  <input type="text" id="order" placeholder="Enter Order ID">
  <button onclick="checkStatus()">Check Status</button>

  <div class="box" id="statusBox">
    <p id="statusResult"></p>
  </div>
</div>

<script>
/* ==============================
   CONFIG
============================== */
const API_URL = "https://script.google.com/macros/s/AKfycbz4vOP0E6mwRQhVDt259JF05wSyRJSKxB5GdP7NHvrVkGyEL1EPs8y2MGJNQ9f-AHTC/exec"; // Replace with your deployment URL

/* ==============================
   HELPER: BUTTON LOADING
============================== */
function setLoading(state, btn){
  btn.disabled = state;
  btn.innerText = state ? "Processing..." : "Pay Now";
}

/* ==============================
   CREATE PAYMENT
============================== */
async function createPayment(){
  const email = document.getElementById("email").value.trim();
  const amount = document.getElementById("amount").value;
  const btn = event.target;

  if(!email || !email.includes("@")) { alert("Enter valid email"); return; }
  if(!amount || amount < 10) { alert("Minimum amount is 10 KES"); return; }

  setLoading(true, btn);

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ email, amount })
    });
    const data = await response.json();

    if(data.status === "success"){
      // Show payment link
      document.getElementById("paymentLink").innerHTML =
        "✅ Payment link generated:<br><a href='" + data.payment_link + "' target='_blank'>👉 Click to Pay</a>";

      // Save order
      localStorage.setItem("orderID", data.order);
      document.getElementById("order").value = data.order;

      // Auto-open payment page
      window.open(data.payment_link, "_blank");

      // Start auto-checking status
      startAutoCheck();

    } else {
      alert("❌ " + data.message);
    }

  } catch(err) {
    alert("Network error. Please try again.");
  }

  setLoading(false, btn);
}

/* ==============================
   CHECK PAYMENT STATUS
============================== */
async function checkStatus(){
  const order = document.getElementById("order").value.trim();
  if(!order) { alert("Enter Order ID"); return; }

  try {
    const response = await fetch(API_URL + "?order=" + order);
    const data = await response.json();

    let msg="", cls="";
    if(data.status === "PENDING") { msg="⏳ Payment Pending"; cls="pending"; }
    else if(data.status === "COMPLETE") { msg="✅ Payment Successful"; cls="success"; stopAutoCheck(); }
    else if(data.status === "EXPIRED") { msg="⚠️ Payment Expired"; cls="error"; stopAutoCheck(); }
    else { msg="❌ Order not found"; cls="error"; }

    const el = document.getElementById("statusResult");
    el.innerText = msg;
    el.className = cls;

  } catch(err) {
    document.getElementById("statusResult").innerText = "Error checking status";
  }
}

/* ==============================
   AUTO-CHECK PAYMENT STATUS
============================== */
let interval;
function startAutoCheck(){
  if(interval) clearInterval(interval);
  interval = setInterval(() => {
    const order = document.getElementById("order").value.trim();
    if(order) checkStatus();
  }, 5000);
}

function stopAutoCheck(){
  if(interval) clearInterval(interval);
}

/* ==============================
   LOAD LAST ORDER
============================== */
window.onload = function(){
  const saved = localStorage.getItem("orderID");
  if(saved){
    document.getElementById("order").value = saved;
    startAutoCheck();
  }
};
</script>

</body>
</html>
